# Eureka Config
eureka.client.service-url.defaultZone=http://eureka-service:8761/eureka/

spring.datasource.url=jdbc:postgresql://postgres:5432/shopsphereuser
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

#IP instead of hostname
eureka.instance.prefer-ip-address=true


jwt.secret=mySelfAbhishekUpadhyayAndCurrentlyIamPersuingBtechInCseFromLpu


#actuator endpoints exposed
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#Logging
logging.file.name=D:/Abhishek/Spring_Evaluation_Log/auth.log
logging.level.root=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.level.com.netflix.eureka=OFF


# Zipkin endpoint (NO Docker → localhost)
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# Capture all traces (dev)
management.tracing.sampling.probability=1.0
