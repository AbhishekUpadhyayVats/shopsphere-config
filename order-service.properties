#Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.datasource.url=jdbc:postgresql://localhost:5432/shopsphereorder
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect


#jwt.secret=mySelfAbhishekUpadhyayAndCurrentlyIamPersuingBtechInCseFromLpu


spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis


#IP instead of hostname
eureka.instance.prefer-ip-address=true


#actuator endpoints exposed
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


#RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest



#Logging
logging.file.name=D:\Abhishek\order.log
logging.level.root=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.level.com.netflix.eureka=OFF


# Zipkin endpoint (NO Docker → localhost)
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Capture all traces (dev)
management.tracing.sampling.probability=1.0
